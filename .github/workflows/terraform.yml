name: Terraform Validate and Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Init (dev)
        run: terraform init -backend=false
        working-directory: environments/dev

      - name: Terraform Validate (dev)
        run: terraform validate
        working-directory: environments/dev

      - name: Terraform Init (staging)
        run: terraform init -backend=false
        working-directory: environments/staging

      - name: Terraform Validate (staging)
        run: terraform validate
        working-directory: environments/staging

      - name: Terraform Init (production)
        run: terraform init -backend=false
        working-directory: environments/production

      - name: Terraform Validate (production)
        run: terraform validate
        working-directory: environments/production

  security-scan:
    name: Checkov Security Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false
          output_format: cli
          download_external_modules: true

  drift-detection:
    name: Weekly Drift Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init
        working-directory: environments/dev

      - name: Check for drift
        run: terraform plan -detailed-exitcode
        working-directory: environments/dev
        continue-on-error: true

      - name: Notify on drift detected
        if: failure()
        run: echo "Infrastructure drift detected - review terraform plan output above"
